  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ─── SVG NAV ICONS ─────────────────────────────────── */
const IcoPartidos = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" width="22" height="22">
    <circle cx="12" cy="12" r="10"/>
    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
    <path d="M2 12h20"/>
  </svg>
);
const IcoTabla = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" width="22" height="22">
    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
    <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
    <path d="M4 22h16"/>
    <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
    <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
    <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
  </svg>
);
const IcoResultados = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" width="22" height="22">
    <path d="M9 11l3 3L22 4"/>
    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
  </svg>
);
const IcoPerfil = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" width="22" height="22">
    <circle cx="12" cy="8" r="4"/>
    <path d="M20 21a8 8 0 1 0-16 0"/>
  </svg>
);

/* ─── BOTTOM NAV ─────────────────────────────────────── */
function BottomNav({ active, onChange }) {
  const tabs = [
    { id:'partidos',   label:'Partidos',   Icon: IcoPartidos   },
    { id:'tabla',      label:'Tabla',      Icon: IcoTabla      },
    { id:'resultados', label:'Resultados', Icon: IcoResultados },
    { id:'perfil',     label:'Perfil',     Icon: IcoPerfil     },
  ];

  return (
    <nav style={{
      height: 'var(--nav-height)',
      background: 'var(--bg-surface)',
      borderTop: '1px solid var(--bg-border)',
      display: 'flex',
      alignItems: 'center',
      paddingBottom: 'env(safe-area-inset-bottom, 0px)',
      flexShrink: 0,
    }}>
      {tabs.map(({ id, label, Icon }) => {
        const isActive = active === id;
        return (
          <button key={id} onClick={() => onChange(id)} style={{
            flex: 1,
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
            padding: '10px 4px 6px',
            background: 'none', border: 'none', cursor: 'pointer',
            color: isActive ? 'var(--accent)' : 'var(--text-tertiary)',
            transition: 'color var(--dur-fast) var(--ease-smooth)',
            position: 'relative',
          }}>
            {isActive && (
              <span style={{
                position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)',
                width: 28, height: 3, borderRadius: '0 0 3px 3px',
                background: 'var(--accent)',
              }} />
            )}
            <Icon />
            <span style={{ fontSize: 10, fontFamily: 'var(--font-ui)', fontWeight: isActive ? 700 : 500, letterSpacing: '0.01em' }}>
              {label}
            </span>
          </button>
        );
      })}
    </nav>
  );
}

/* ─── MAIN APP ───────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tema": "broadcast",
  "usuario": "juan",
  "animaciones": true
}/*EDITMODE-END*/;

function App() {
  const [screen, setScreen]   = useState('partidos');
  const [prevScreen, setPrev] = useState(null);
  const [t, setTweak]         = useTweaks(TWEAK_DEFAULTS);

  /* Apply theme to <html> */
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.tema);
  }, [t.tema]);

  /* Predictions state — persisted to localStorage */
  const [predictions, setPredictions] = useState(() => {
    try {
      const saved = localStorage.getItem('qr_preds_v1');
      return saved ? JSON.parse(saved) : (window.QData.PREDICTIONS[t.usuario] || {});
    } catch { return {}; }
  });

  /* Re-seed predictions when user changes */
  useEffect(() => {
    const userPreds = window.QData.PREDICTIONS[t.usuario] || {};
    setPredictions(userPreds);
  }, [t.usuario]);

  const updatePrediction = useCallback((matchId, pred) => {
    setPredictions(prev => {
      const next = { ...prev, [matchId]: pred };
      try { localStorage.setItem('qr_preds_v1', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  /* Screen change with key for re-animation */
  const handleScreenChange = (s) => {
    setPrev(screen);
    setScreen(s);
  };

  /* Render current screen */
  const renderScreen = () => {
    const key = `${screen}-${t.usuario}`;
    const props = { userId: t.usuario, predictions, onPredictionChange: updatePrediction };
    switch (screen) {
      case 'partidos':   return <PartidosScreen   key={key} {...props} />;
      case 'tabla':      return <TablaScreen       key={key} userId={t.usuario} />;
      case 'resultados': return <ResultadosScreen  key={key} userId={t.usuario} />;
      case 'perfil':     return <PerfilScreen      key={key} userId={t.usuario} />;
      default:           return null;
    }
  };

  const playerOptions = window.QData.PLAYERS.map(p => p.id);
  const playerLabels  = window.QData.PLAYERS.map(p => p.name);

  return (
    <div style={{
      height: '100dvh',
      display: 'flex',
      flexDirection: 'column',
      background: 'var(--bg-base)',
      maxWidth: 430,
      margin: '0 auto',
      overflow: 'hidden',
      position: 'relative',
    }}>
      {/* Screen area */}
      <div className="screen-enter" key={screen} style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {renderScreen()}
      </div>

      {/* Bottom Nav */}
      <BottomNav active={screen} onChange={handleScreenChange} />

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection label="Visual" />
        <TweakRadio
          label="Tema"
          value={t.tema}
          options={['broadcast', 'carbon']}
          onChange={v => setTweak('tema', v)}
        />
        <TweakToggle
          label="Animaciones"
          value={t.animaciones}
          onChange={v => setTweak('animaciones', v)}
        />
        <TweakSection label="Jugador activo" />
        <TweakSelect
          label="Eres..."
          value={t.usuario}
          options={playerOptions}
          onChange={v => setTweak('usuario', v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
